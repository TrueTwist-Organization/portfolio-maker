# Render Blueprint — https://render.com/docs/blueprint-spec
# Set secrets (SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY, JWT_SECRET, API keys) in the Render dashboard, not in this file.
services:
  - type: web
    name: portfolio-maker-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
